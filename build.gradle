tasks.register("writeBuildTime") {
  group = "build"
  doLast {
    buildTimeDir.mkdirs()
    if (!buildTimeFile.exists()) {
      buildTimeFile.text = String.valueOf((long) (System.currentTimeMillis() / 1000))
    }
  }
}
tasks.processResources {
  dependsOn("writeBuildTime")
  from(buildTimeDir) { into("com/trustsign") }
}

