tasks.register("buildInstaller") {
  group = "distribution"
  description = "Builds the Windows installer with bundled JRE (requires Windows and Inno Setup 6). Packages files from build/client prepared by clientFolderWindows."
  dependsOn("clientFolderWindows", "verifyInstallerInputs")
  doLast {
    if (!System.getProperty("os.name", "").toLowerCase().contains("windows")) {
      throw new GradleException(
        "The Windows installer can only be built on Windows (Inno Setup is Windows-only).\n" +
        "On Mac/Linux: use ./gradlew clientFolderCrossPlatform and give the client build/client/ (or zip it).\n" +
        "To build the .exe installer, run ./gradlew buildInstaller on a Windows machine with Inno Setup 6 installed."
      )
    }
    def isccExe = ["C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe", "C:\\Program Files\\Inno Setup 6\\ISCC.exe"].find { new File(it).exists() } ?: "iscc"
    if (isccExe == "iscc") {
      throw new GradleException(
        "Inno Setup 6 is required to build the Windows installer but was not found.\n" +
        "Install from https://jrsoftware.org/isinfo.php (use default path so Gradle finds ISCC.exe).\n" +
        "If you don't need the .exe installer, run ./gradlew clientFolderCrossPlatform and distribute build/client/ (e.g. as a zip)."
      )
    }
    def iss = file("installer/TrustSign.iss")
    if (!iss.exists()) throw new GradleException("installer/TrustSign.iss not found")
    def pb = new ProcessBuilder(isccExe, iss.absolutePath)
    pb.directory(file("."))
    pb.inheritIO()
    def ret = pb.start().waitFor()
    if (ret != 0) throw new GradleException("ISCC exited with code $ret")
  }
}

tasks.register("printSha256") {
  group = "distribution"
  description = "Prints SHA-256 for a local file. Usage: ./gradlew printSha256 -Pfile=/path/to/file"
  doLast {
    def filePath = findProperty("file")?.toString()
    if (filePath == null || filePath.isBlank()) {
      throw new GradleException("Missing -Pfile=/path/to/file")
    }
    def f = file(filePath)
    if (!f.exists() || !f.isFile()) {
      throw new GradleException("File not found: ${f}")
    }
    def md = java.security.MessageDigest.getInstance("SHA-256")
    f.withInputStream { is ->
      byte[] buf = new byte[8192]
      int read
      while ((read = is.read(buf)) != -1) {
        md.update(buf, 0, read)
      }
    }
    def sha = md.digest().encodeHex().toString()
    println("SHA256(${f})=${sha}")
  }
}

def appName = "TrustSign"
def appVersion = "${project.version}"
def appVersionParts = appVersion.tokenize('.')
def appVersionMajor = appVersionParts ? appVersionParts[0].toInteger() : 1
def appVersionMinor = appVersionParts.size() > 1 ? appVersionParts[1].toInteger() : 0
def appVersionPatch = appVersionParts.size() > 2 ? appVersionParts[2].toInteger() : 0
def jpackageAppVersion = "${Math.max(1, appVersionMajor)}.${Math.max(0, appVersionMinor)}.${Math.max(0, appVersionPatch)}"
def clientJarName = "trustsign-${project.version}-all.jar"
def isMacOs = System.getProperty("os.name", "").toLowerCase().contains("mac")
def isLinuxOs = System.getProperty("os.name", "").toLowerCase().contains("linux")
def isWindowsOs = System.getProperty("os.name", "").toLowerCase().contains("windows")
def releaseDir = file("$buildDir/release")
def macSignIdentity = (findProperty("macSignIdentity") ?: System.getenv("TRUSTSIGN_MAC_SIGN_IDENTITY"))?.toString()
def macSigningKeychain = (findProperty("macSigningKeychain") ?: System.getenv("TRUSTSIGN_MAC_SIGNING_KEYCHAIN"))?.toString()
def macNotaryProfile = (findProperty("macNotaryProfile") ?: System.getenv("TRUSTSIGN_MAC_NOTARY_PROFILE"))?.toString()
def macDmgPath = file("$buildDir/release/mac/TrustSign-${jpackageAppVersion}.dmg")

tasks.register("packageMacAppImage") {
  group = "distribution"
  description = "Build macOS .app image via jpackage (macOS host only)"
  dependsOn("clientFolderMac")
  onlyIf { isMacOs }
  doLast {
    releaseDir.mkdirs()
    def dest = new File(releaseDir, "mac")
    dest.mkdirs()
    def cmd = [
      "jpackage",
      "--type", "app-image",
      "--name", appName,
      "--app-version", jpackageAppVersion,
      "--input", file("$buildDir/client").absolutePath,
      "--main-jar", clientJarName,
      "--main-class", "com.trustsign.server.Main",
      "--runtime-image", file("$buildDir/client/jre").absolutePath,
      "--dest", dest.absolutePath
    ]
    if (macSignIdentity != null && !macSignIdentity.isBlank()) {
      cmd += ["--mac-sign", "--mac-signing-key-user-name", macSignIdentity]
      if (macSigningKeychain != null && !macSigningKeychain.isBlank()) {
        cmd += ["--mac-signing-keychain", macSigningKeychain]
      }
    }
    def pb = new ProcessBuilder(cmd)
    pb.directory(file("."))
    pb.inheritIO()
    def ret = pb.start().waitFor()
    if (ret != 0) throw new GradleException("jpackage app-image failed with code $ret")
  }
}

tasks.register("packageWindowsExe") {
  group = "distribution"
  description = "Build Windows .exe installer via jpackage (Windows host only)"
  if (isWindowsOs) {
    dependsOn("clientFolderWindows", "verifyInstallerInputs")
  }
  doLast {
    if (!isWindowsOs) {
      throw new GradleException("packageWindowsExe requires Windows host. Run this task on Windows.")
    }
    releaseDir.mkdirs()
    def dest = new File(releaseDir, "windows")
    dest.mkdirs()
    def pb = new ProcessBuilder(
      "jpackage",
      "--type", "exe",
      "--name", appName,
      "--app-version", jpackageAppVersion,
      "--input", file("$buildDir/client").absolutePath,
      "--main-jar", clientJarName,
      "--main-class", "com.trustsign.server.Main",
      "--runtime-image", file("$buildDir/client/jre").absolutePath,
      "--dest", dest.absolutePath,
      "--win-menu",
      "--win-shortcut",
