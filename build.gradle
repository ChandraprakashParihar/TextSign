def macJreExtractDir = file("$buildDir/jre-mac/extracted")
def macJreSha256 = (findProperty("macJreSha256") ?: System.getenv("TRUSTSIGN_MAC_JRE_SHA256"))?.toString()
def linuxJreTarGzUrl = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.18%2B8/OpenJDK17U-jre_x64_linux_hotspot_17.0.18_8.tar.gz"
def linuxJreTarGz = file("$buildDir/jre-linux/temurin17-jre-linux-x64.tar.gz")
def linuxJreExtractDir = file("$buildDir/jre-linux/extracted")
