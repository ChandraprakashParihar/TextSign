tasks.register("packageMacDmg") {
  group = "distribution"
  description = "Build macOS .dmg via jpackage (macOS host only)"
  dependsOn("clientFolderMac")
  onlyIf { isMacOs }
  doLast {
    releaseDir.mkdirs()
    def dest = new File(releaseDir, "mac")
    dest.mkdirs()
    def cmd = [
      "jpackage",
      "--type", "dmg",
      "--name", appName,
      "--app-version", jpackageAppVersion,
      "--input", file("$buildDir/client").absolutePath,
      "--main-jar", clientJarName,
      "--main-class", "com.trustsign.server.Main",
      "--runtime-image", file("$buildDir/client/jre").absolutePath,
      "--dest", dest.absolutePath
    ]
    if (macSignIdentity != null && !macSignIdentity.isBlank()) {
      cmd += ["--mac-sign", "--mac-signing-key-user-name", macSignIdentity]
      if (macSigningKeychain != null && !macSigningKeychain.isBlank()) {
        cmd += ["--mac-signing-keychain", macSigningKeychain]
      }
    }
    def pb = new ProcessBuilder(cmd)
    pb.directory(file("."))
    pb.inheritIO()
    def ret = pb.start().waitFor()
    if (ret != 0) throw new GradleException("jpackage dmg failed with code $ret")
  }
}

tasks.register("notarizeMacDmg") {
  group = "distribution"
  description = "Submits mac DMG for notarization and staples ticket (macOS host only)"
  dependsOn("packageMacDmg")
  onlyIf { isMacOs }
  doLast {
    if (macNotaryProfile == null || macNotaryProfile.isBlank()) {
      throw new GradleException(
        "Missing mac notary profile. Set -PmacNotaryProfile=<keychain-profile> " +
        "or TRUSTSIGN_MAC_NOTARY_PROFILE."
      )
    }
    if (!macDmgPath.exists()) {
      throw new GradleException("DMG not found: ${macDmgPath}")
    }
    def submit = new ProcessBuilder(
      "xcrun", "notarytool", "submit", macDmgPath.absolutePath,
      "--keychain-profile", macNotaryProfile,
      "--wait"
    )
    submit.directory(file("."))
    submit.inheritIO()
    def submitRet = submit.start().waitFor()
    if (submitRet != 0) {
      throw new GradleException("notarytool submit failed with code $submitRet")
    }

    def staple = new ProcessBuilder("xcrun", "stapler", "staple", macDmgPath.absolutePath)
    staple.directory(file("."))
    staple.inheritIO()
    def stapleRet = staple.start().waitFor()
    if (stapleRet != 0) {
      throw new GradleException("stapler failed with code $stapleRet")
    }
  }
}

tasks.register("verifyMacDmgGatekeeper") {
  group = "distribution"
  description = "Verifies macOS Gatekeeper assessment for generated DMG and bundled .app"
  dependsOn("packageMacDmg")
  onlyIf { isMacOs }
  doLast {
    if (!macDmgPath.exists()) {
      throw new GradleException("DMG not found: ${macDmgPath}")
    }

    def verifyProc = new ProcessBuilder("hdiutil", "verify", macDmgPath.absolutePath)
    verifyProc.directory(file("."))
    verifyProc.inheritIO()
    def verifyRet = verifyProc.start().waitFor()
    if (verifyRet != 0) {
      throw new GradleException("hdiutil verify failed with code $verifyRet")
    }

    def attachProc = new ProcessBuilder(
      "hdiutil", "attach", macDmgPath.absolutePath, "-nobrowse", "-readonly"
    )
    attachProc.directory(file("."))
    def attach = attachProc.start()
    def attachOut = attach.inputStream.getText("UTF-8")
    def attachErr = attach.errorStream.getText("UTF-8")
    def attachRet = attach.waitFor()
    if (attachRet != 0) {
      throw new GradleException("Failed to mount DMG. stderr: ${attachErr}")
    }

    String mountedVolume = null
    String device = null
    for (String line : attachOut.readLines()) {
      if (line.contains("/Volumes/")) {
        def parts = line.trim().split(/\s+/)
        if (parts.length >= 3) {
          device = parts[0]
          mountedVolume = parts[parts.length - 1]
        }
      }
    }
    if (mountedVolume == null) {
      throw new GradleException("Unable to detect mounted volume from hdiutil output:\n${attachOut}")
    }

    try {
      def appPath = "${mountedVolume}/${appName}.app"
      def spctl = new ProcessBuilder("spctl", "-a", "-vv", appPath)
      spctl.directory(file("."))
      def sp = spctl.start()
      def spOut = sp.inputStream.getText("UTF-8")
      def spErr = sp.errorStream.getText("UTF-8")
      def spRet = sp.waitFor()

      println("Gatekeeper assessment output:")
      if (spOut != null && !spOut.isBlank()) println(spOut.trim())
      if (spErr != null && !spErr.isBlank()) println(spErr.trim())

      if (spRet == 0) {
        println("Gatekeeper check PASSED for ${appPath}")
      } else {
        throw new GradleException("Gatekeeper check FAILED for ${appPath}")
      }
    } finally {
      if (device != null) {
        def detachProc = new ProcessBuilder("hdiutil", "detach", device)
        detachProc.directory(file("."))
        detachProc.inheritIO()
        detachProc.start().waitFor()
      }
    }
  }
}

