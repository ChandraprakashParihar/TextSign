tasks.register("downloadWindowsJre", de.undercouch.gradle.tasks.download.Download) {
  group = "distribution"
  description = "Downloads Eclipse Temurin 17 JRE for Windows x64 (used when building installer with bundled JRE)"
  onlyIf { !windowsJreZip.exists() }
  src(windowsJreZipUrl)
  dest(windowsJreZip)
  overwrite(false)
}

tasks.register("verifyWindowsJreChecksum") {
  group = "distribution"
  description = "Verifies SHA-256 of downloaded Windows JRE zip"
  dependsOn("downloadWindowsJre")
  doLast {
    if (!windowsJreZip.exists()) {
      throw new GradleException("Windows JRE archive missing: ${windowsJreZip}")
    }
    if (windowsJreSha256 == null || windowsJreSha256.isBlank()) {
      throw new GradleException(
        "Missing expected SHA-256 for Windows JRE. Set -PwindowsJreSha256=<sha256> " +
        "or TRUSTSIGN_WINDOWS_JRE_SHA256 environment variable."
      )
    }
    def md = java.security.MessageDigest.getInstance("SHA-256")
    windowsJreZip.withInputStream { is ->
      byte[] buf = new byte[8192]
      int read
      while ((read = is.read(buf)) != -1) {
        md.update(buf, 0, read)
      }
    }
    def actual = md.digest().encodeHex().toString()
    if (!actual.equalsIgnoreCase(windowsJreSha256.trim())) {
      throw new GradleException(
        "Windows JRE SHA-256 mismatch. expected=${windowsJreSha256} actual=${actual}"
      )
    }
  }
}

tasks.register("verifyInstallerInputs") {
  group = "distribution"
  description = "CI guard: validates installer prerequisites (including JRE checksum pin)"
  dependsOn("verifyWindowsJreChecksum")
}

tasks.register("extractWindowsJre") {
  group = "distribution"
  description = "Extracts the Windows JRE zip (after download)"
  dependsOn("verifyWindowsJreChecksum")
  def extractTo = windowsJreExtractDir
  outputs.dir(extractTo)
  doLast {
    delete(extractTo)
    extractTo.mkdirs()
    copy {
      from(zipTree(windowsJreZip))
      into(extractTo)
    }
  }
}

