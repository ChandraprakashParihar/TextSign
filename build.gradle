// Embed build timestamp so licence first-use cannot be backdated beyond release.
// Only write once (when file missing) so "Licence state invalid" doesn't happen on every dev run.
def buildTimeDir = file("$buildDir/generated/licence-resources")
def buildTimeFile = file("$buildTimeDir/build-time.txt")
tasks.register("writeBuildTime") {
  group = "build"
  doLast {
    buildTimeDir.mkdirs()
    if (!buildTimeFile.exists()) {
      buildTimeFile.text = String.valueOf((long) (System.currentTimeMillis() / 1000))
    }
  }
}
tasks.processResources {
  dependsOn("writeBuildTime")
  from(buildTimeDir) { into("com/trustsign") }
}

// Eclipse Temurin 17 JRE for Windows x64 (bundled so clients don't need to install Java)
def windowsJreZipUrl = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.18%2B8/OpenJDK17U-jre_x64_windows_hotspot_17.0.18_8.zip"
def windowsJreZip = file("$buildDir/jre-win/temurin17-jre-win-x64.zip")
def windowsJreExtractDir = file("$buildDir/jre-win/extracted")
def windowsJreSha256 = (findProperty("windowsJreSha256") ?: System.getenv("TRUSTSIGN_WINDOWS_JRE_SHA256"))?.toString()
def macJreTarGzUrl = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.18%2B8/OpenJDK17U-jre_x64_mac_hotspot_17.0.18_8.tar.gz"
def macJreTarGz = file("$buildDir/jre-mac/temurin17-jre-mac-x64.tar.gz")
def macJreExtractDir = file("$buildDir/jre-mac/extracted")
def macJreSha256 = (findProperty("macJreSha256") ?: System.getenv("TRUSTSIGN_MAC_JRE_SHA256"))?.toString()
def linuxJreTarGzUrl = "https://github.com/adoptium/temurin17-binaries/releases/download/jdk-17.0.18%2B8/OpenJDK17U-jre_x64_linux_hotspot_17.0.18_8.tar.gz"
def linuxJreTarGz = file("$buildDir/jre-linux/temurin17-jre-linux-x64.tar.gz")
def linuxJreExtractDir = file("$buildDir/jre-linux/extracted")
def linuxJreSha256 = (findProperty("linuxJreSha256") ?: System.getenv("TRUSTSIGN_LINUX_JRE_SHA256"))?.toString()

tasks.register("downloadWindowsJre", de.undercouch.gradle.tasks.download.Download) {
  group = "distribution"
  description = "Downloads Eclipse Temurin 17 JRE for Windows x64 (used when building installer with bundled JRE)"
  onlyIf { !windowsJreZip.exists() }
  src(windowsJreZipUrl)
  dest(windowsJreZip)
  overwrite(false)
}

tasks.register("verifyWindowsJreChecksum") {
  group = "distribution"
  description = "Verifies SHA-256 of downloaded Windows JRE zip"
  dependsOn("downloadWindowsJre")
  doLast {
    if (!windowsJreZip.exists()) {
      throw new GradleException("Windows JRE archive missing: ${windowsJreZip}")
    }
    if (windowsJreSha256 == null || windowsJreSha256.isBlank()) {
      throw new GradleException(
        "Missing expected SHA-256 for Windows JRE. Set -PwindowsJreSha256=<sha256> " +
        "or TRUSTSIGN_WINDOWS_JRE_SHA256 environment variable."
      )
    }
    def md = java.security.MessageDigest.getInstance("SHA-256")
    windowsJreZip.withInputStream { is ->
      byte[] buf = new byte[8192]
      int read
      while ((read = is.read(buf)) != -1) {
        md.update(buf, 0, read)
      }
    }
    def actual = md.digest().encodeHex().toString()
    if (!actual.equalsIgnoreCase(windowsJreSha256.trim())) {
      throw new GradleException(
        "Windows JRE SHA-256 mismatch. expected=${windowsJreSha256} actual=${actual}"
      )
    }
  }
}

tasks.register("verifyInstallerInputs") {
  group = "distribution"
  description = "CI guard: validates installer prerequisites (including JRE checksum pin)"
  dependsOn("verifyWindowsJreChecksum")
}

tasks.register("extractWindowsJre") {
  group = "distribution"
  description = "Extracts the Windows JRE zip (after download)"
  dependsOn("verifyWindowsJreChecksum")
  def extractTo = windowsJreExtractDir
  outputs.dir(extractTo)
  doLast {
    extractTo.mkdirs()
    copy {
      from(zipTree(windowsJreZip))
      into(extractTo)
    }
  }
}

